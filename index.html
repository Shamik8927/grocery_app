<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Smart Grocery Tracker | Bill Total + Analytics</title>
    <link rel="stylesheet" href="style.css">
    <!-- Add manifest for PWA (optional) -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1f3a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛒 Smart Grocery Tracker</h1>
            
        </div>

        <div class="main-grid">
            <!-- Left Column -->
            <div>
                <div class="card">
                    <h2>➕ Add Items</h2>
                    <div class="input-group" style="position: relative;">
                        <input type="text" id="itemInput" placeholder="Item name (e.g., Milk, Eggs)" autocomplete="off">
                        <div class="qty-group">
                            <input type="number" id="qtyInput" placeholder="Qty" value="1" step="0.5">
                            <select id="unitSelect">
                                <option value="Pcs">Pcs</option>
                                <option value="kg">kg</option>
                                <option value="g">g</option>
                                <option value="L">L</option>
                                <option value="Pack">Pack</option>
                                <option value="Bottle">Bottle</option>
                            </select>
                        </div>
                        <button id="addBtn">➕ Add</button>
                        <div id="suggestions" class="suggestions"></div>
                    </div>
                </div>

                <div class="card" style="margin-top: 25px;">
                    <h2>📝 Shopping List</h2>
                    <div class="stats-bar">
                        <div class="stat">
                            <div class="stat-number" id="totalItems">0</div>
                            <div class="stat-label">Total</div>
                        </div>
                        <div class="stat">
                            <div class="stat-number" id="purchasedItems">0</div>
                            <div class="stat-label">Bought</div>
                        </div>
                        <div class="stat">
                            <div class="stat-number" id="remainingItems">0</div>
                            <div class="stat-label">Left</div>
                        </div>
                    </div>
                    
                    <ul id="groceryList" class="grocery-list">
                        <li class="empty-state">✨ Your list is empty</li>
                    </ul>

                    <div class="controls">
                        <button id="clearPurchasedBtn" class="btn btn-secondary">✓ Clear Bought</button>
                        <button id="clearAllBtn" class="btn btn-danger">🗑️ Clear All</button>
                    </div>
                </div>
            </div>

            <!-- Right Column -->
            <div>
                <div class="card">
                    <h2>💰 Finalize Bill</h2>
                    <div class="bill-section">
                        <h3>🧾 Total Bill Amount</h3>
                        <div class="bill-input-group">
                            <input type="number" id="totalBillInput" placeholder="Enter bill amount (₹)" step="0.01">
                            <button id="finalizePurchaseBtn">✅ Save</button>
                        </div>
                        <p class="bill-note">
                            ⚡ Check bought items, then enter receipt total
                        </p>
                    </div>
                </div>

                <div class="card" style="margin-top: 25px;">
                    <h2>📅 Calendar</h2>
                    <div class="calendar">
                        <div class="calendar-header">
                            <button class="calendar-nav" id="prevMonth">◀</button>
                            <h3 id="currentMonthYear">March 2026</h3>
                            <button class="calendar-nav" id="nextMonth">▶</button>
                        </div>
                        <div class="calendar-grid" id="calendarGrid"></div>
                    </div>
                </div>

                <div class="card" style="margin-top: 25px;">
                    <h2>📜 History</h2>
                    
                    <!-- Search Filter Section -->
                    <div class="search-section">
                        <div class="search-group">
                            <label>Filter by:</label>
                            <div class="search-input-group">
                                <select id="searchMonth" class="search-select">
                                    <option value="all">All Months</option>
                                    <option value="0">January</option>
                                    <option value="1">February</option>
                                    <option value="2">March</option>
                                    <option value="3">April</option>
                                    <option value="4">May</option>
                                    <option value="5">June</option>
                                    <option value="6">July</option>
                                    <option value="7">August</option>
                                    <option value="8">September</option>
                                    <option value="9">October</option>
                                    <option value="10">November</option>
                                    <option value="11">December</option>
                                </select>
                                <select id="searchYear" class="search-select">
                                    <option value="all">All Years</option>
                                </select>
                                <button id="applyFilterBtn" class="btn btn-primary filter-btn">🔍 Filter</button>
                                <button id="clearFilterBtn" class="btn btn-secondary filter-btn">Clear</button>
                            </div>
                        </div>
                        
                        <div id="filterSummary" class="filter-summary" style="display: none;"></div>
                    </div>
                    
                    <div id="purchaseHistory" class="purchase-history">
                        <p class="empty-state">No purchases yet</p>
                    </div>
                    
                    <div id="filterStats" class="filter-stats" style="display: none;">
                        <div class="stats-row">
                            <span>📊 Showing <strong id="showingCount">0</strong> of <strong id="totalCount">0</strong></span>
                            <span>💰 ₹<strong id="filteredTotal">0</strong></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Item Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2>✏️ Edit Item</h2>
            <div style="margin-top: 20px;">
                <input type="text" id="editItemName" placeholder="Item name" class="modal-input">
                <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <input type="number" id="editItemQty" placeholder="Quantity" step="0.5" class="modal-input" style="flex: 1;">
                    <select id="editItemUnit" class="modal-input" style="flex: 1;">
                        <option value="Pcs">Pcs</option>
                        <option value="kg">kg</option>
                        <option value="g">g</option>
                        <option value="L">L</option>
                        <option value="Pack">Pack</option>
                        <option value="Bottle">Bottle</option>
                    </select>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button id="saveEditBtn" class="btn btn-primary" style="flex: 1;">💾 Save</button>
                    <button onclick="closeEditModal()" class="btn btn-secondary" style="flex: 1;">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Purchase Details Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Purchase Details</h2>
            <div id="modalBody"></div>
            <button onclick="closeModal()" class="btn btn-secondary" style="margin-top:20px; width:100%;">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
